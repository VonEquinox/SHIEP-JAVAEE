<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#000"/></marker></defs>
<style>text{font-family:"Songti SC","SimSun","PingFang SC",serif;fill:#000;font-size:26px}.small{font-size:20px}.box{fill:#fff;stroke:#000;stroke-width:3}.line{stroke:#000;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
<text x="600" y="45" text-anchor="middle" font-weight="700">易宿酒店预订管理系统三层架构图</text>
<rect class="box" x="70" y="105" width="260" height="300"/><text x="200" y="150" text-anchor="middle" font-weight="700">表示层</text><text class="small" x="200" y="205" text-anchor="middle">Vue3 + Element Plus</text><text class="small" x="200" y="250" text-anchor="middle">登录、酒店搜索</text><text class="small" x="200" y="295" text-anchor="middle">订单与后台页面</text><text class="small" x="200" y="340" text-anchor="middle">表单校验与菜单控制</text>
<rect class="box" x="470" y="105" width="260" height="300"/><text x="600" y="150" text-anchor="middle" font-weight="700">业务层</text><text class="small" x="600" y="205" text-anchor="middle">Spring Boot 单体应用</text><text class="small" x="600" y="250" text-anchor="middle">Controller / Service</text><text class="small" x="600" y="295" text-anchor="middle">权限校验与业务规则</text><text class="small" x="600" y="340" text-anchor="middle">统一返回与异常处理</text>
<rect class="box" x="870" y="105" width="260" height="300"/><text x="1000" y="150" text-anchor="middle" font-weight="700">数据层</text><text class="small" x="1000" y="205" text-anchor="middle">MyBatis Mapper</text><text class="small" x="1000" y="250" text-anchor="middle">MySQL 数据库</text><text class="small" x="1000" y="295" text-anchor="middle">表、索引、触发器</text><text class="small" x="1000" y="340" text-anchor="middle">视图与存储过程</text>
<path class="line" d="M330 255 H465"/><path class="line" d="M730 255 H865"/><path class="line" d="M865 310 H735"/><path class="line" d="M465 310 H335"/><text class="small" x="400" y="235" text-anchor="middle">REST API</text><text class="small" x="800" y="235" text-anchor="middle">参数绑定</text><text class="small" x="800" y="350" text-anchor="middle">结果集</text><text class="small" x="400" y="350" text-anchor="middle">JSON 响应</text>
</svg>