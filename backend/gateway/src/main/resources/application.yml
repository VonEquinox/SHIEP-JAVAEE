server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**,/api/guest/**
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotel/**,/api/room/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**,/api/review/**,/api/stats/**
